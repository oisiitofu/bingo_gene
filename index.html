<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>キャラビンゴバトル</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --text: #e5e7eb;
      --muted: #94a3b8;
      --red: #ff334f;
      --blue: #2f7dff;
      --gold: #f8c453;
      --cyan: #22d3ee;
      --panel-line: rgba(148, 163, 184, .18);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(115deg, rgba(255, 51, 79, .18), transparent 24%),
        linear-gradient(245deg, rgba(47, 125, 255, .18), transparent 28%),
        radial-gradient(circle at 50% -20%, rgba(248, 196, 83, .16), transparent 34%),
        linear-gradient(135deg, #050712, #0f172a 45%, #020617);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black, transparent 75%);
      opacity: .55;
    }

    .app {
      max-width: 1360px;
      margin: 0 auto;
      padding: 28px;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(15,23,42,.78);
      border: 1px solid rgba(248,196,83,.38);
      color: #fde68a;
      font-weight: 900;
      letter-spacing: .08em;
      box-shadow: 0 0 26px rgba(248,196,83,.12);
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(38px, 7vw, 86px);
      line-height: .92;
      font-weight: 1000;
      background: linear-gradient(90deg, #fff, #f8c453 32%, #22d3ee 68%, #fff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.07em;
      text-shadow: 0 18px 55px rgba(34,211,238,.18);
    }

    .lead {
      color: var(--muted);
      font-weight: 700;
      margin: 0;
    }

    .panel,
    .board-card {
      background: linear-gradient(180deg, rgba(15,23,42,.82), rgba(2,6,23,.76));
      border: 1px solid var(--panel-line);
      box-shadow: 0 24px 80px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.07);
      backdrop-filter: blur(16px);
    }

    .panel {
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .team-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 1000;
      margin-bottom: 14px;
      letter-spacing: .04em;
    }

    .name-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(148,163,184,.25);
      border-radius: 16px;
      font-size: 15px;
      outline: none;
      color: var(--text);
      background: rgba(2,6,23,.62);
      box-shadow: inset 0 2px 10px rgba(0,0,0,.25);
    }

    input::placeholder { color: #64748b; }
    input:focus {
      border-color: rgba(34,211,238,.75);
      box-shadow: 0 0 0 4px rgba(34,211,238,.12), inset 0 2px 10px rgba(0,0,0,.25);
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 1000;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
      letter-spacing: .02em;
    }

    button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    button:active { transform: scale(.96); }

    .primary {
      color: #020617;
      background: linear-gradient(135deg, #f8c453, #22d3ee);
      box-shadow: 0 14px 34px rgba(34,211,238,.18);
    }

    .ghost {
      background: rgba(15,23,42,.78);
      color: var(--text);
      border: 1px solid rgba(148,163,184,.24);
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
    }

    .team-actions,
    .global-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 16px;
    }

    .sound-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .mode-switch {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      border-radius: 18px;
      background: rgba(2,6,23,.58);
      border: 1px solid rgba(148,163,184,.22);
    }

    .mode-button {
      box-shadow: none;
      padding: 10px 14px;
      background: transparent;
      color: var(--muted);
      border: 1px solid transparent;
    }

    .mode-button.active {
      color: #020617;
      background: linear-gradient(135deg, #f8c453, #22d3ee);
      border-color: rgba(255,255,255,.32);
      box-shadow: 0 0 24px rgba(248,196,83,.22);
    }

    .team-display {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .team-box {
      border-radius: 20px;
      padding: 16px;
      font-weight: 800;
      background: rgba(2,6,23,.45);
      position: relative;
      overflow: hidden;
    }

    .team-box::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: .18;
      pointer-events: none;
    }

    .team-box strong {
      display: block;
      margin-bottom: 5px;
      font-size: 18px;
      letter-spacing: .04em;
    }

    .team-box.red {
      border: 1px solid rgba(255,51,79,.35);
      color: #ff8a9b;
    }
    .team-box.red::before { background: linear-gradient(90deg, var(--red), transparent); }

    .team-box.blue {
      border: 1px solid rgba(47,125,255,.35);
      color: #93c5fd;
    }
    .team-box.blue::before { background: linear-gradient(90deg, var(--blue), transparent); }

    .boards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
      margin-top: 20px;
    }

    .board-card {
      border-radius: 30px;
      overflow: hidden;
      position: relative;
    }

    .board-card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .22;
      background: linear-gradient(135deg, transparent 0 45%, rgba(255,255,255,.16) 46%, transparent 48% 100%);
    }

    .board-card.red { box-shadow: 0 24px 80px rgba(0,0,0,.38), 0 0 38px rgba(255,51,79,.12); }
    .board-card.blue { box-shadow: 0 24px 80px rgba(0,0,0,.38), 0 0 38px rgba(47,125,255,.13); }

    .board-head {
      color: #fff;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }

    .board-card.red .board-head { background: linear-gradient(135deg, rgba(255,51,79,.95), rgba(127,16,32,.72)); }
    .board-card.blue .board-head { background: linear-gradient(135deg, rgba(47,125,255,.95), rgba(15,47,127,.72)); }

    .board-name {
      font-size: 28px;
      font-weight: 1000;
      letter-spacing: -0.04em;
    }

    .board-sub {
      font-size: 13px;
      opacity: .86;
      font-weight: 800;
    }

    .score {
      min-width: 92px;
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(2,6,23,.38);
      text-align: center;
      border: 1px solid rgba(255,255,255,.18);
    }

    .score-label {
      font-size: 11px;
      font-weight: 1000;
      opacity: .75;
      letter-spacing: .12em;
    }

    .score-num {
      font-size: 36px;
      line-height: 1;
      font-weight: 1000;
    }

    .board-body { padding: 18px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(var(--grid-size, 5), 1fr);
      gap: 10px;
    }

    .cell {
      position: relative;
      aspect-ratio: 1 / 1;
      border: 1px solid rgba(148,163,184,.20);
      border-radius: 16px;
      background: radial-gradient(circle at top, rgba(255,255,255,.08), rgba(15,23,42,.88));
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 10px 24px rgba(0,0,0,.32);
      user-select: none;
    }

    .cell:hover {
      transform: translateY(-2px);
      border-color: rgba(248,196,83,.55);
    }

    .cell img {
      width: 114%;
      height: 114%;
      object-fit: contain;
      padding: 0;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,.35));
    }

    .grid[data-size="7"] .cell img {
      width: 132%;
      height: 132%;
    }


    .cell.free {
      background: linear-gradient(135deg, #f8c453, #fff7ad);
      color: #020617;
      font-size: clamp(14px, 2.4vw, 24px);
      font-weight: 1000;
      letter-spacing: .04em;
      text-shadow: none;
    }

    .cell.open.red {
      background: linear-gradient(135deg, rgba(255,51,79,.92), rgba(127,16,32,.78));
      outline: 3px solid rgba(255,138,155,.75);
    }

    .cell.open.blue {
      background: linear-gradient(135deg, rgba(47,125,255,.92), rgba(15,47,127,.78));
      outline: 3px solid rgba(147,197,253,.75);
    }

    .cell.open img {
      opacity: .72;
      transform: scale(.98);
      filter: grayscale(.18) drop-shadow(0 8px 12px rgba(0,0,0,.35));
    }

    .fallback {
      font-size: clamp(20px, 5vw, 46px);
      font-weight: 1000;
      color: #e2e8f0;
    }

    .open-label {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.10);
      z-index: 3;
    }

    .cell.open .open-label { display: flex; }

    .open-label span {
      background: rgba(255,255,255,.96);
      color: #020617;
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 14px;
      font-weight: 1000;
      box-shadow: 0 8px 18px rgba(0,0,0,.25);
    }

    .cell.line { animation: lineGlow .72s infinite alternate; }

    .cell.reach {
      outline: 3px solid var(--gold);
      animation: sharpReach .42s infinite alternate;
    }

    .reach-label {
      position: absolute;
      right: 5px;
      bottom: 5px;
      z-index: 4;
      display: none;
      transform: skew(-12deg);
      background: #020617;
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 1000;
      box-shadow: 0 0 14px rgba(248,196,83,.45);
    }

    .cell.reach .reach-label { display: block; }

    .board-actions {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .status {
      border-radius: 999px;
      background: rgba(2,6,23,.55);
      border: 1px solid rgba(148,163,184,.22);
      padding: 10px 14px;
      font-weight: 1000;
    }

    .status.red { color: #ff8a9b; }
    .status.blue { color: #93c5fd; }

    .reach-flash {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 90;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.16), rgba(0,0,0,.82) 60%),
        rgba(0,0,0,.72);
    }

    .reach-flash.show {
      display: flex;
      animation: reachScreenFade var(--reach-duration, 2.8s) cubic-bezier(.2,.9,.2,1) forwards;
    }

    .reach-flash::before,
    .reach-flash::after {
      content: "";
      position: absolute;
      width: 180vw;
      height: 20vh;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.96), rgba(248,196,83,.96), rgba(34,211,238,.92), transparent);
      box-shadow: 0 0 60px rgba(248,196,83,.75);
      opacity: .95;
    }

    .reach-flash::before { transform: rotate(-16deg) translateX(-150vw); }
    .reach-flash::after { transform: rotate(16deg) translateX(150vw); }

    .reach-flash .slash-a,
    .reach-flash .slash-b,
    .reach-flash .slash-c {
      position: absolute;
      width: 170vw;
      height: 10vh;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.85), rgba(248,196,83,.95), transparent);
      box-shadow: 0 0 50px rgba(248,196,83,.55);
      opacity: 0;
    }

    .reach-flash .slash-a { transform: rotate(-28deg) translateX(-160vw); }
    .reach-flash .slash-b { transform: rotate(8deg) translateX(160vw); }
    .reach-flash .slash-c { transform: rotate(28deg) translateX(-160vw); }

    .reach-flash.show::before { animation: slashLeftBig .85s cubic-bezier(.05,.85,.2,1) forwards; }
    .reach-flash.show::after { animation: slashRightBig .95s .12s cubic-bezier(.05,.85,.2,1) forwards; }
    .reach-flash.show .slash-a { animation: extraSlash1 .95s .18s ease-out forwards; }
    .reach-flash.show .slash-b { animation: extraSlash2 1.1s .28s ease-out forwards; }
    .reach-flash.show .slash-c { animation: extraSlash3 1s .38s ease-out forwards; }

    .reach-flash-box {
      position: relative;
      width: min(920px, 96vw);
      padding: 26px 20px 36px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(2,6,23,.96), rgba(15,23,42,.92)), rgba(2,6,23,.95);
      text-align: center;
      border: 2px solid rgba(248,196,83,.85);
      box-shadow: 0 0 0 3px rgba(255,255,255,.08), 0 0 50px rgba(248,196,83,.45), 0 0 100px rgba(34,211,238,.18);
      transform: skew(-10deg) scale(.7);
      overflow: hidden;
    }

    .reach-flash.show .reach-flash-box { animation: reachJakinPop 2.05s cubic-bezier(.18,1.2,.2,1) forwards; }

    .reach-flash-box::before {
      content: "";
      position: absolute;
      inset: -20%;
      background: radial-gradient(circle, rgba(248,196,83,.28), transparent 40%), radial-gradient(circle at 70% 30%, rgba(34,211,238,.18), transparent 30%);
      animation: auraSpin 4s linear infinite;
    }

    .reach-flash-box::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0 35%, rgba(255,255,255,.16) 36%, transparent 40% 100%);
    }

    .reach-flash-small {
      position: relative;
      z-index: 2;
      display: inline-block;
      margin-bottom: 10px;
      padding: 8px 20px;
      background: linear-gradient(135deg, #ff334f, #7f1020);
      color: #fff;
      font-size: clamp(16px, 3vw, 28px);
      font-weight: 1000;
      letter-spacing: .18em;
      transform: skew(-10deg);
      box-shadow: 0 0 20px rgba(255,51,79,.35);
    }

    .reach-flash-main {
      position: relative;
      z-index: 2;
      color: #fff;
      font-size: clamp(82px, 18vw, 210px);
      line-height: .84;
      font-weight: 1000;
      letter-spacing: -0.10em;
      text-shadow:
        4px 4px 0 #020617,
        8px 8px 0 #f8c453,
        12px 12px 0 #22d3ee,
        0 0 28px rgba(248,196,83,.75),
        0 0 44px rgba(255,255,255,.45);
      transform: scale(.85);
    }

    .reach-flash.show .reach-flash-main { animation: textBoom 1.7s .08s ease-out forwards; }

    .reach-flash-note {
      position: relative;
      z-index: 2;
      margin-top: 16px;
      color: #fde68a;
      font-size: clamp(18px, 3vw, 34px);
      font-weight: 1000;
      letter-spacing: .10em;
      text-shadow: 0 0 18px rgba(248,196,83,.45);
    }

    .reach-ring {
      position: absolute;
      inset: 50% auto auto 50%;
      width: 120px;
      height: 120px;
      border: 8px solid rgba(248,196,83,.95);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(.2);
      opacity: 0;
      box-shadow: 0 0 40px rgba(248,196,83,.65);
    }

    .reach-ring.second {
      border-color: rgba(34,211,238,.9);
      box-shadow: 0 0 40px rgba(34,211,238,.55);
    }

    .reach-flash.show .reach-ring { animation: ringBurst 1.2s .1s ease-out forwards; }
    .reach-flash.show .reach-ring.second { animation: ringBurst2 1.35s .18s ease-out forwards; }

    .bingo-flash {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 120;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(248,196,83,.20), rgba(0,0,0,.90) 62%),
        rgba(0,0,0,.84);
    }

    .bingo-flash.show {
      display: flex;
      animation: bingoFade var(--bingo-duration, 5.2s) ease-out forwards;
    }

    .bingo-flash::before {
      content: "BINGO BINGO BINGO BINGO BINGO";
      position: absolute;
      width: 200vw;
      top: 14%;
      left: -40vw;
      color: rgba(255,255,255,.06);
      font-size: clamp(54px, 10vw, 140px);
      font-weight: 1000;
      letter-spacing: .08em;
      transform: rotate(-12deg);
      animation: bgTextMove 4.2s linear forwards;
      white-space: nowrap;
    }

    .bingo-rays {
      position: absolute;
      inset: -50%;
      background: conic-gradient(from 0deg, transparent, rgba(248,196,83,.22), transparent, rgba(34,211,238,.18), transparent, rgba(255,51,79,.18), transparent);
      animation: auraSpin 3.2s linear infinite;
    }

    .bingo-box {
      position: relative;
      width: min(980px, 96vw);
      padding: 34px 22px 42px;
      text-align: center;
      border-radius: 30px;
      background: linear-gradient(180deg, rgba(15,23,42,.95), rgba(2,6,23,.92));
      border: 3px solid rgba(248,196,83,.95);
      box-shadow: 0 0 0 5px rgba(255,255,255,.08), 0 0 80px rgba(248,196,83,.45), 0 0 140px rgba(255,51,79,.18);
      overflow: hidden;
      animation: bingoBoxPop 4.2s cubic-bezier(.16,1.15,.2,1) forwards;
    }

    .bingo-box::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,.22), transparent 24%),
        radial-gradient(circle at 70% 30%, rgba(34,211,238,.20), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(248,196,83,.24), transparent 30%);
      animation: auraSpin 5s linear infinite;
    }

    .bingo-small,
    .bingo-main,
    .bingo-note {
      position: relative;
      z-index: 2;
    }

    .bingo-small {
      display: inline-block;
      padding: 8px 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, #f8c453, #fff7ad);
      color: #020617;
      font-size: clamp(16px, 3vw, 30px);
      font-weight: 1000;
      letter-spacing: .16em;
      box-shadow: 0 0 34px rgba(248,196,83,.34);
    }

    .bingo-main {
      margin-top: 14px;
      font-size: clamp(82px, 19vw, 230px);
      line-height: .85;
      font-weight: 1000;
      letter-spacing: -0.08em;
      color: #fff;
      text-shadow:
        5px 5px 0 #020617,
        10px 10px 0 #f8c453,
        15px 15px 0 #ff334f,
        0 0 40px rgba(248,196,83,.75),
        0 0 80px rgba(255,255,255,.35);
      animation: bingoTextPulse .65s infinite alternate;
    }

    .bingo-note {
      margin-top: 18px;
      color: #fde68a;
      font-size: clamp(20px, 4vw, 42px);
      font-weight: 1000;
      letter-spacing: .08em;
    }


    .bingo-members,
    .bingo-praise {
      position: relative;
      z-index: 2;
    }

    .bingo-members {
      width: min(820px, 92%);
      margin: 18px auto 0;
      padding: 14px 18px;
      border-radius: 22px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.22);
      color: #fff;
      font-size: clamp(18px, 3.1vw, 34px);
      font-weight: 1000;
      line-height: 1.25;
      text-shadow: 0 0 18px rgba(255,255,255,.22);
      animation: memberRollIn .9s .35s cubic-bezier(.16,1.15,.2,1) both;
    }

    .bingo-members-label {
      display: block;
      margin-bottom: 6px;
      color: #fde68a;
      font-size: clamp(12px, 2vw, 18px);
      letter-spacing: .18em;
    }

    .bingo-praise {
      width: min(860px, 94%);
      margin: 14px auto 0;
      color: #fff7ad;
      font-size: clamp(16px, 2.7vw, 28px);
      font-weight: 1000;
      line-height: 1.45;
      text-shadow: 0 0 20px rgba(248,196,83,.45), 2px 2px 0 rgba(2,6,23,.55);
      animation: praisePop .95s .55s cubic-bezier(.16,1.25,.2,1) both;
    }

    @keyframes memberRollIn {
      0% { opacity: 0; transform: translateY(28px) scale(.86) rotate(-2deg); filter: blur(8px); }
      65% { opacity: 1; transform: translateY(-4px) scale(1.04) rotate(1deg); filter: blur(0); }
      100% { opacity: 1; transform: translateY(0) scale(1) rotate(0); }
    }

    @keyframes praisePop {
      0% { opacity: 0; transform: scale(.72); filter: blur(6px); }
      55% { opacity: 1; transform: scale(1.08); filter: blur(0); }
      100% { opacity: 1; transform: scale(1); }
    }

    .bingo-actions {
      position: relative;
      z-index: 2;
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      pointer-events: auto;
    }

      20% { transform: translate(7px, -3px); }
      30% { transform: translate(-5px, -5px); }
      40% { transform: translate(8px, 4px); }
      50% { transform: translate(-7px, 2px); }
      60% { transform: translate(6px, -4px); }

  <div class="bingo-flash" id="bingoFlash">
    <div class="bingo-rays"></div>
    <div class="bingo-box">
      <div class="bingo-small" id="bingoFlashTeam">赤チーム</div>
      <div class="bingo-main">BINGO!!!</div>
      <div class="bingo-note">2ライン達成！！！勝利！！！</div>
      <div class="bingo-members" id="bingoMembers">
        <span class="bingo-members-label">WINNING MEMBERS</span>
        <span id="bingoMembersText">メンバー</span>
      </div>
      <div class="bingo-praise" id="bingoPraise">すごすぎる！！！</div>
      <div class="bingo-actions">
        <button class="primary" onclick="resetMarks()">開いたマスをリセット</button>
        <button class="ghost" onclick="resetAll()">カードも作り直す</button>
        <button class="ghost" onclick="closeBingo()">閉じる</button>
      </div>
    </div>

  <script>
    const IMAGE_COUNT = 86;

    function getCardSize() {
      return state.gridSize * state.gridSize;
    }

    function getFreeIndex() {
      return Math.floor(getCardSize() / 2);
    }

    function getBingoLines() {
      const size = state.gridSize;
      const lines = [];

      for (let row = 0; row < size; row++) {
        lines.push(Array.from({ length: size }, (_, col) => row * size + col));
      }

      for (let col = 0; col < size; col++) {
        lines.push(Array.from({ length: size }, (_, row) => row * size + col));
      }

      lines.push(Array.from({ length: size }, (_, i) => i * size + i));
      lines.push(Array.from({ length: size }, (_, i) => i * size + (size - 1 - i)));
      return lines;
    }

    const state = {
      gridSize: 5,
      red: { card: [], marked: [] },
      blue: { card: [], marked: [] },
      winner: null,
      lastReach: { red: 0, blue: 0 },
      soundEnabled: true,
      audioContext: null,
      theme: "neon",
      reachEffect: "jakin",
      bingoEffect: "max",
      soundPack: "arcade",
      speed: "slow"
    };

    function makeCard() {
      const numbers = Array.from({ length: IMAGE_COUNT }, (_, i) => i + 1);
      shuffle(numbers);
      const picked = numbers.slice(0, getCardSize() - 1);
      picked.splice(getFreeIndex(), 0, "FREE");
      return picked;
    }

    function initialMarked() {
      return Array.from({ length: getCardSize() }, (_, i) => i === getFreeIndex());
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function getBingoResult(marked) {
      const lines = getBingoLines();
      const completedLines = lines.filter(line => line.every(index => marked[index]));
      const reachLines = lines.filter(line => {
        const openedCount = line.filter(index => marked[index]).length;
        return openedCount === state.gridSize - 1;
      });
      return {
        count: completedLines.length,
        reachCount: reachLines.length,
        completedLines,
        reachLines,
        winningCells: new Set(completedLines.flat()),
        reachCells: new Set(reachLines.flat())
      };
    }

    function renderCard(team) {
      const grid = document.getElementById(`${team}Grid`);
      const teamState = state[team];
      const result = getBingoResult(teamState.marked);
      grid.style.setProperty("--grid-size", state.gridSize);
      grid.dataset.size = state.gridSize;
      grid.innerHTML = "";

      teamState.card.forEach((item, index) => {
        const cell = document.createElement("button");
        cell.className = "cell";

        if (item === "FREE") {
          cell.classList.add("free", "open", team);
          cell.innerHTML = "✨<br>FREE";
        } else {
          const img = document.createElement("img");
          img.src = `images/characters/${item}.png`;
          img.alt = `キャラ${item}`;
          img.onerror = () => {
            img.remove();
            const fallback = document.createElement("div");
            fallback.className = "fallback";
            fallback.textContent = item;
            cell.appendChild(fallback);
          };

          const openLabel = document.createElement("div");
          openLabel.className = "open-label";
          openLabel.innerHTML = "<span>OPEN</span>";

          const reachLabel = document.createElement("div");
          reachLabel.className = "reach-label";
          reachLabel.textContent = "リーチ";

          cell.appendChild(img);
          cell.appendChild(openLabel);
          cell.appendChild(reachLabel);
        }

        if (teamState.marked[index]) cell.classList.add("open", team);
        if (result.reachCells.has(index) && !result.winningCells.has(index)) cell.classList.add("reach");
        if (result.winningCells.has(index)) cell.classList.add("line");

        cell.onclick = () => toggleCell(team, index);
        grid.appendChild(cell);
      });

      document.getElementById(`${team}Score`).textContent = result.count;
      const remain = Math.max(0, 2 - result.count);
      const reachText = result.reachCount > 0 ? ` / リーチ${result.reachCount}本！` : "";
      document.getElementById(`${team}Status`).textContent = result.count >= 2 ? "勝利条件達成！" : `あと${remain}ラインで勝利${reachText}`;
    }

    function renderAll() {
      renderCard("red");
      renderCard("blue");
      checkReachFlash();
      checkWinner();
    }

    function toggleCell(team, index) {
      if (index === getFreeIndex() || state.winner) return;
      unlockAudio();
      state[team].marked[index] = !state[team].marked[index];
      playClickSound(team);
      renderAll();
    }

    function setGridSize(size) {
      if (state.gridSize === size) return;
      unlockAudio();
      state.gridSize = size;
      document.getElementById("mode5").classList.toggle("active", size === 5);
      document.getElementById("mode7").classList.toggle("active", size === 7);
      playShuffleSound();
      resetAll();
    }

    function shuffleCard(team) {
      unlockAudio();
      state[team].card = makeCard();
      state[team].marked = initialMarked();
      state.lastReach[team] = 0;
      playShuffleSound();
      closeBingo();
      renderAll();
    }

    function resetMarks() {
      state.red.marked = initialMarked();
      state.blue.marked = initialMarked();
      state.winner = null;
      state.lastReach.red = 0;
      state.lastReach.blue = 0;
      closeBingo();
      renderAll();
    }

    function resetAll() {
      state.red.card = makeCard();
      state.blue.card = makeCard();
      state.red.marked = initialMarked();
      state.blue.marked = initialMarked();
      state.winner = null;
      state.lastReach.red = 0;
      state.lastReach.blue = 0;
      closeBingo();
      renderAll();
    }

    function checkReachFlash() {
      if (state.winner) return;

      ["red", "blue"].forEach(team => {
        const result = getBingoResult(state[team].marked);
        if (result.reachCount > state.lastReach[team] && result.count < 2) {
          showReach(team, team === "red" ? "赤チーム" : "青チーム");
        }
        state.lastReach[team] = result.reachCount;
      });
    }

    function checkWinner() {
      if (state.winner) return;

      const redResult = getBingoResult(state.red.marked);
      const blueResult = getBingoResult(state.blue.marked);

      if (redResult.count >= 2) {
        showBingo("red", "赤チーム");
      } else if (blueResult.count >= 2) {
        showBingo("blue", "青チーム");
      }
    }

    function showReach(team, label) {
      const flash = document.getElementById("reachFlash");
      const flashTeam = document.getElementById("reachFlashTeam");

      flashTeam.textContent = label;
      flashTeam.style.background = team === "red"
        ? "linear-gradient(135deg, #ff334f, #7f1020)"
        : "linear-gradient(135deg, #2f7dff, #0f2f7f)";
      applyEffectClass(flash, "reach-flash");

      flash.classList.remove("show");
      document.body.classList.remove("reach-shake");
      void flash.offsetWidth;
      void document.body.offsetWidth;

      flash.classList.add("show");
      document.body.classList.add("reach-shake");
      playReachSound();

      setTimeout(() => {
        flash.classList.remove("show");
        document.body.classList.remove("reach-shake");
      }, getReachDuration());
    }

    function showBingo(team, label) {
      state.winner = team;

      const flash = document.getElementById("bingoFlash");
      const flashTeam = document.getElementById("bingoFlashTeam");
      flashTeam.textContent = `${label} 勝利`;
      flashTeam.style.background = team === "red"
        ? "linear-gradient(135deg, #ff334f, #f8c453)"
        : "linear-gradient(135deg, #2f7dff, #22d3ee)";
      applyEffectClass(flash, "bingo-flash");

      flash.classList.remove("show");
      document.body.classList.remove("bingo-shake");
      void flash.offsetWidth;
      void document.body.offsetWidth;

      flash.classList.add("show");
      document.body.classList.add("bingo-shake");
      playBingoSound();
      launchConfetti(team, 100);

      setTimeout(() => document.body.classList.remove("bingo-shake"), Math.min(1400, getBingoDuration() - 400));
    }

    function closeBingo() {
      document.getElementById("bingoFlash").classList.remove("show");
      document.body.classList.remove("bingo-shake");
    }

    function divideTeams() {
      unlockAudio();
      const entered = [1,2,3,4,5,6]
        .map(i => document.getElementById(`player${i}`).value.trim())
        .filter(Boolean)
        .slice(0, 6);

      let names = entered.length >= 4
        ? entered
        : ["プレイヤー1", "プレイヤー2", "プレイヤー3", "プレイヤー4", "プレイヤー5", "プレイヤー6"];

      if (names.length % 2 === 1 && names.length < 6) {
        names.push(`プレイヤー${names.length + 1}`);
      }

      shuffle(names);
      const half = Math.ceil(names.length / 2);
      document.getElementById("redMembers").textContent = names.slice(0, half).join("・");
      document.getElementById("blueMembers").textContent = names.slice(half).join("・");
      playShuffleSound();
    }

    function toggleSound() {
      state.soundEnabled = !state.soundEnabled;
      document.getElementById("soundButton").textContent = state.soundEnabled ? "🔊 音 ON" : "🔇 音 OFF";
      if (state.soundEnabled) {
        unlockAudio();
        playClickSound("blue");
      }
    }

    function unlockAudio() {
      if (!state.audioContext) {
        state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (state.audioContext.state === "suspended") {
        state.audioContext.resume();
      }
    }

    function playTone(freq, start, duration, type = "sine", gainValue = 0.08, bendTo = null) {
      if (!state.soundEnabled) return;
      unlockAudio();

      const ctx = state.audioContext;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();

      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
      if (bendTo) {
        osc.frequency.exponentialRampToValueAtTime(bendTo, ctx.currentTime + start + duration);
      }

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(2400, ctx.currentTime + start);

      gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(gainValue, ctx.currentTime + start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + duration);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + duration + 0.02);
    }

    function playNoise(start, duration, gainValue = 0.08) {
      if (!state.soundEnabled) return;
      unlockAudio();

      const ctx = state.audioContext;
      const bufferSize = ctx.sampleRate * duration;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      }

      const source = ctx.createBufferSource();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      filter.type = "highpass";
      filter.frequency.setValueAtTime(900, ctx.currentTime + start);
      gain.gain.setValueAtTime(gainValue, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + duration);

      source.buffer = buffer;
      source.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      source.start(ctx.currentTime + start);
      source.stop(ctx.currentTime + start + duration);
    }

    function playClickSound(team) {
      const base = team === "red" ? 280 : 360;
      playTone(base, 0, 0.07, "square", 0.035, base * 1.8);
      playTone(base * 2, 0.04, 0.06, "triangle", 0.025);
    }

    function playShuffleSound() {
      playNoise(0, 0.16, 0.045);
      playTone(220, 0.02, 0.08, "sawtooth", 0.03, 520);
      playTone(420, 0.08, 0.08, "sawtooth", 0.03, 780);
    }

    function playReachSound() {
      playNoise(0, 0.22, 0.10);
      playTone(220, 0.00, 0.16, "sawtooth", 0.08, 980);
      playTone(880, 0.08, 0.18, "square", 0.06, 1320);
      playTone(1320, 0.22, 0.22, "triangle", 0.08, 660);
      playTone(1760, 0.36, 0.18, "square", 0.045, 900);
    }

    function playBingoSound() {
      playNoise(0, 0.35, 0.16);
      playTone(110, 0.00, 0.40, "sawtooth", 0.10, 55);
      playTone(392, 0.10, 0.18, "square", 0.07);
      playTone(523.25, 0.25, 0.18, "square", 0.07);
      playTone(659.25, 0.40, 0.22, "square", 0.08);
      playTone(783.99, 0.58, 0.36, "triangle", 0.09);
      playTone(1046.5, 0.80, 0.42, "triangle", 0.07);
      playNoise(0.95, 0.42, 0.10);
    }

    function launchConfetti(team, amount = 60) {
      const colors = team === "red"
        ? ["#ff334f", "#f8c453", "#ffffff", "#ff8a9b"]
        : ["#2f7dff", "#22d3ee", "#ffffff", "#f8c453"];

      for (let i = 0; i < amount; i++) {
        const piece = document.createElement("div");
        piece.textContent = ["★", "◆", "●", "✦", "▲"][Math.floor(Math.random() * 5)];
        piece.style.position = "fixed";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.top = "-60px";
        piece.style.color = colors[Math.floor(Math.random() * colors.length)];
        piece.style.fontSize = 14 + Math.random() * 30 + "px";
        piece.style.zIndex = "160";
        piece.style.pointerEvents = "none";
        piece.style.transition = `transform ${2.2 + Math.random() * 1.4}s cubic-bezier(.12,.8,.25,1), opacity ${2.2 + Math.random() * 1.4}s ease-out`;
        document.body.appendChild(piece);

        requestAnimationFrame(() => {
          piece.style.transform = `translate(${(Math.random() - .5) * 40}vw, ${85 + Math.random() * 40}vh) rotate(${Math.random() * 1440}deg)`;
          piece.style.opacity = "0";
        });

        setTimeout(() => piece.remove(), 3800);
      }
    }

    function setTheme(theme) {
      state.theme = theme;
      document.body.className = document.body.className.split(/\s+/).filter(cls => !cls.startsWith("theme-")).join(" ").trim();
      if (document.body.className) document.body.className += ' ';
      document.body.className += `theme-${theme}`;
      const select = document.getElementById("themeSelect");
      if (select) select.value = theme;
    }

    function setReachEffect(effect) {
      state.reachEffect = effect;
      const select = document.getElementById("reachEffectSelect");
      if (select) select.value = effect;
    }

    function setBingoEffect(effect) {
      state.bingoEffect = effect;
      const select = document.getElementById("bingoEffectSelect");
      if (select) select.value = effect;
    }

    function setSoundPack(pack) {
      state.soundPack = pack;
      const select = document.getElementById("soundPackSelect");
      if (select) select.value = pack;
      if (state.soundEnabled) {
        unlockAudio();
        playClickSound("blue");
      }
    }

    function setSpeed(speed) {
      state.speed = speed;
      const select = document.getElementById("speedSelect");
      if (select) select.value = speed;
    }

    function getReachDuration() {
      if (state.speed === "fast") return 1300;
      if (state.speed === "slow") return 3000;
      return 2200;
    }

    function getBingoDuration() {
      if (state.speed === "fast") return 3000;
      if (state.speed === "slow") return 5600;
      return 4300;
    }

    function applyEffectClass(element, baseClass, effectName) {
      element.className = `${baseClass} effect-${effectName}`;
      element.style.setProperty("--effect-duration", `${(baseClass === "reach-flash" ? getReachDuration() : getBingoDuration())/1000}s`);
    }

    function randomStyle() {
      const themes = ["neon","cyber","luxury","pop","horror","arcade","pastel","mono","fire","ocean","comic","glass","terminal","sakura","industrial","forest"];
      const effects = ["jakin","max","explosion","laser","glitch","casino","cute","minimal","thunder","matrix","samurai","disco"];
      const sounds = ["arcade","cyber","casino","cute","horror","fanfare","metal","retro8","scifi","zen"];
      setTheme(themes[Math.floor(Math.random() * themes.length)]);
      setReachEffect(effects[Math.floor(Math.random() * effects.length)]);
      setBingoEffect(effects[Math.floor(Math.random() * effects.length)]);
      setSoundPack(sounds[Math.floor(Math.random() * sounds.length)]);
      playShuffleSound();
    }

    function randomThemeOnly() {
      const themes = ["neon","cyber","luxury","pop","horror","arcade","pastel","mono","fire","ocean","comic","glass","terminal","sakura","industrial","forest"];
      setTheme(themes[Math.floor(Math.random() * themes.length)]);
      playShuffleSound();
    }

    function previewReach() { unlockAudio(); showReach(Math.random() > .5 ? "red" : "blue", Math.random() > .5 ? "赤チーム" : "青チーム"); }
    function previewBingo() { unlockAudio(); const previousWinner = state.winner; showBingo(Math.random() > .5 ? "red" : "blue", Math.random() > .5 ? "赤チーム" : "青チーム"); setTimeout(() => { state.winner = previousWinner; }, 50); }

    function toggleSound() {
      state.soundEnabled = !state.soundEnabled;
      document.getElementById("soundButton").textContent = state.soundEnabled ? "🔊 音 ON" : "🔇 音 OFF";
      if (state.soundEnabled) { unlockAudio(); playClickSound("blue"); }
    }

    function playClickSound(team) {
      const pack = state.soundPack;
      if (pack === "cute") { playTone(team === "red" ? 660 : 780, 0, .08, "triangle", .03, team === "red" ? 880 : 990); playTone(team === "red" ? 990 : 1175, .05, .09, "sine", .018); }
      else if (pack === "horror") { playTone(team === "red" ? 140 : 170, 0, .11, "sawtooth", .045, team === "red" ? 110 : 120); }
      else if (pack === "retro8") { playTone(team === "red" ? 330 : 392, 0, .06, "square", .035); }
      else if (pack === "zen") { playTone(team === "red" ? 220 : 247, 0, .12, "sine", .025); }
      else if (pack === "metal") { playNoise(0, .04, .04); playTone(team === "red" ? 180 : 220, 0, .08, "square", .03); }
      else if (pack === "scifi") { playTone(team === "red" ? 520 : 620, 0, .08, "sawtooth", .028, team === "red" ? 940 : 1040); }
      else if (pack === "casino") { playTone(880, 0, .05, "triangle", .025); playTone(1175, .04, .05, "triangle", .025); }
      else { const base = team === "red" ? 280 : 360; playTone(base, 0, .07, pack === "cyber" ? "sawtooth" : "square", .035, base * 1.8); playTone(base * 2, .04, .06, "triangle", .025); }
    }

    function playShuffleSound() {
      const pack = state.soundPack;
      if (pack === "cute") { playTone(523.25, 0, .08, "triangle", .03); playTone(659.25, .07, .08, "triangle", .03); playTone(783.99, .14, .1, "triangle", .03); }
      else if (pack === "horror") { playNoise(0, .18, .05); playTone(180, .02, .16, "sawtooth", .04, 90); }
      else if (pack === "retro8") { [262,330,392].forEach((f,i)=>playTone(f, i*.05, .06, "square", .03)); }
      else if (pack === "casino") { [523.25,659.25,783.99,1046.5].forEach((f,i)=>playTone(f, i*.045, .07, "triangle", .028)); }
      else if (pack === "metal") { playNoise(0, .16, .07); playTone(110, 0, .18, "sawtooth", .06, 80); }
      else if (pack === "fanfare") { [392,523.25,659.25].forEach((f,i)=>playTone(f, i*.06, .13, "triangle", .04)); }
      else if (pack === "zen") { [220,277.18,329.63].forEach((f,i)=>playTone(f, i*.1, .18, "sine", .02)); }
      else if (pack === "scifi") { playTone(260, 0, .08, "sawtooth", .03, 760); playTone(480, .07, .08, "sawtooth", .03, 980); }
      else { playNoise(0, .16, .045); playTone(220, .02, .08, "sawtooth", .03, 520); playTone(420, .08, .08, "sawtooth", .03, 780); }
    }

    function playReachSound() {
      const pack = state.soundPack;
      if (pack === "cute") { [880,1175,1567.98].forEach((f,i)=>playTone(f, i*.08, .16, "triangle", .04)); }
      else if (pack === "horror") { playNoise(0, .28, .09); playTone(130, 0, .34, "sawtooth", .08, 70); playTone(311.13, .1, .28, "sine", .03, 220); }
      else if (pack === "retro8") { [392,523.25,659.25,784].forEach((f,i)=>playTone(f, i*.07, .09, "square", .05)); }
      else if (pack === "casino") { [659.25,783.99,987.77,1318.51].forEach((f,i)=>playTone(f, i*.06, .1, "triangle", .04)); }
      else if (pack === "metal") { playNoise(0, .3, .11); playTone(146.83, 0, .22, "sawtooth", .08, 90); playTone(220, .12, .22, "square", .05, 174.61); }
      else if (pack === "fanfare") { playTone(392, 0, .14, "triangle", .05); playTone(523.25,.1,.14,"triangle",.055); playTone(659.25,.22,.18,"triangle",.06); playTone(1046.5,.35,.26,"triangle",.07); }
      else if (pack === "zen") { playTone(329.63,0,.18,"sine",.03); playTone(440,.12,.22,"sine",.03); playTone(659.25,.25,.28,"sine",.03); }
      else if (pack === "scifi") { playNoise(0, .12, .04); playTone(300,0,.2,"sawtooth",.05,1200); playTone(900,.15,.22,"triangle",.05,600); }
      else if (pack === "cyber") { playNoise(0,.18,.06); playTone(220,0,.16,"sawtooth",.06,980); playTone(880,.08,.18,"square",.05,1320); playTone(1760,.3,.16,"triangle",.03,900); }
      else { playNoise(0,.22,.10); playTone(220,0,.16,"sawtooth",.08,980); playTone(880,.08,.18,"square",.06,1320); playTone(1320,.22,.22,"triangle",.08,660); playTone(1760,.36,.18,"square",.045,900); }
    }

    function playBingoSound() {
      const pack = state.soundPack;
      if (pack === "cute") { [523.25,659.25,783.99,1046.5,1318.51].forEach((f,i)=>playTone(f, i*.12, .22, "triangle", .05)); }
      else if (pack === "horror") { playNoise(0, .45, .13); playTone(90,0,.55,"sawtooth",.10,45); playTone(220,.38,.36,"sine",.04,110); }
      else if (pack === "retro8") { [261.63,329.63,392,523.25,659.25,783.99].forEach((f,i)=>playTone(f, i*.09, .12, "square", .055)); }
      else if (pack === "casino") { [523.25,659.25,783.99,1046.5,1318.51,1567.98].forEach((f,i)=>playTone(f, i*.08, .12, "triangle", .045)); }
      else if (pack === "metal") { playNoise(0, .55, .18); playTone(82.41,0,.5,"sawtooth",.12,55); playTone(164.81,.3,.4,"square",.06); playTone(220,.65,.36,"triangle",.05); }
      else if (pack === "fanfare") { [392,523.25,659.25,783.99,1046.5,1318.51].forEach((f,i)=>playTone(f, i*.14, .26, "triangle", .06)); }
      else if (pack === "zen") { [220,277.18,329.63,440,554.37].forEach((f,i)=>playTone(f, i*.18, .38, "sine", .03)); }
      else if (pack === "scifi") { playNoise(0, .2, .06); playTone(180,0,.32,"sawtooth",.05,1200); playTone(980,.18,.24,"triangle",.05,440); playTone(1320,.42,.36,"triangle",.06,880); }
      else if (pack === "cyber") { playNoise(0,.3,.14); playTone(110,0,.4,"sawtooth",.10,55); playTone(392,.1,.18,"square",.07); playTone(523.25,.25,.18,"square",.07); playTone(659.25,.40,.22,"square",.08); playTone(783.99,.58,.36,"triangle",.09); playTone(1046.5,.80,.42,"triangle",.07); playNoise(.95,.42,.10); }
      else { playNoise(0,.35,.16); playTone(110,0,.40,"sawtooth",.10,55); playTone(392,.10,.18,"square",.07); playTone(523.25,.25,.18,"square",.07); playTone(659.25,.40,.22,"square",.08); playTone(783.99,.58,.36,"triangle",.09); playTone(1046.5,.80,.42,"triangle",.07); playNoise(.95,.42,.10); }
    }

    function showReach(team, label) {
      const flash = document.getElementById("reachFlash");
      const flashTeam = document.getElementById("reachFlashTeam");
      flashTeam.textContent = label;
      flashTeam.style.background = team === "red" ? "linear-gradient(135deg, #ff334f, #7f1020)" : "linear-gradient(135deg, #2f7dff, #0f2f7f)";
      applyEffectClass(flash, "reach-flash", state.reachEffect);
      flash.classList.remove("show"); document.body.classList.remove("reach-shake"); void flash.offsetWidth; void document.body.offsetWidth;
      flash.classList.add("show"); if (state.reachEffect !== 'minimal') document.body.classList.add("reach-shake"); playReachSound();
      setTimeout(() => { flash.classList.remove("show"); document.body.classList.remove("reach-shake"); }, getReachDuration());
    }


    function getTeamMembers(team) {
      const memberElement = document.getElementById(team === "red" ? "redMembers" : "blueMembers");
      const fallback = team === "red" ? "赤チームのみんな" : "青チームのみんな";
      if (!memberElement) return fallback;
      const members = memberElement.textContent
        .split("・")
        .map(name => name.trim())
        .filter(Boolean);
      return members.length ? members.join("・") : fallback;
    }

    function getRandomPraise(team, label, members) {
      const praises = [
        `${members}、これはもう伝説級！${label}の連携、キレ味、勝負強さ、全部が限界突破してます！！！`,
        `${members}、強すぎる！狙って取ったみたいな2ビンゴ、まさに超絶ミラクル勝利！！！`,
        `${members}、鳥肌ものです！この一撃で会場の空気を全部持っていきました！！！`,
        `${members}、すごい！ここぞで決め切る集中力、完全に主人公チームです！！！`,
        `${members}、神がかってます！リーチから勝利までの流れが美しすぎる！！！`,
        `${members}、文句なしの大優勝！この2ビンゴは拍手が止まらないやつです！！！`,
        `${members}、超絶ミラクルだった！今日の勝負運を全部味方につけた最強チームです！！！`,
        `${members}、完璧すぎるフィニッシュ！これはハイライト確定のビンゴです！！！`,
        `${members}、えぐいほど強い！全員のパワーが合体した奇跡の2ラインです！！！`,
        `${members}、お見事！この勝ち方は派手、華麗、そしてめちゃくちゃかっこいい！！！`
      ];
      return praises[Math.floor(Math.random() * praises.length)];
    }

    function showBingo(team, label) {
      state.winner = team;
      const flash = document.getElementById("bingoFlash");
      const flashTeam = document.getElementById("bingoFlashTeam");
      const bingoMembersText = document.getElementById("bingoMembersText");
      const bingoPraise = document.getElementById("bingoPraise");
      const members = getTeamMembers(team);

      flashTeam.textContent = `${label} 勝利`;
      if (bingoMembersText) bingoMembersText.textContent = members;
      if (bingoPraise) bingoPraise.textContent = getRandomPraise(team, label, members);

      flashTeam.style.background = team === "red" ? "linear-gradient(135deg, #ff334f, #f8c453)" : "linear-gradient(135deg, #2f7dff, #22d3ee)";
      applyEffectClass(flash, "bingo-flash", state.bingoEffect);
      flash.classList.remove("show"); document.body.classList.remove("bingo-shake"); void flash.offsetWidth; void document.body.offsetWidth;
      flash.classList.add("show"); if (state.bingoEffect !== 'minimal') document.body.classList.add("bingo-shake"); playBingoSound(); launchConfetti(team, state.bingoEffect === 'minimal' ? 40 : 100);
      setTimeout(() => document.body.classList.remove("bingo-shake"), Math.min(1400, getBingoDuration() - 500));
    }

    setTheme(state.theme);
    setReachEffect(state.reachEffect);
    setBingoEffect(state.bingoEffect);
    setSoundPack(state.soundPack);
    setSpeed(state.speed);
    resetAll();
  </script>
</body>
