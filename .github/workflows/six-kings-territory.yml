name: Six Kings Territory Tick

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: six-kings-territory-tick
  cancel-in-progress: false

jobs:
  advance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Advance 六王領土戦
        run: node scripts/tick-six-kings.mjs
